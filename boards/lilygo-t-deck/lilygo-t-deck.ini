; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:lilygo-t-deck-pro] # T-Deck Plus, need to rename it when merge to MAIN and release next version
board = lilygo-t-deck
board_build.partitions = custom_16Mb.csv
build_src_filter =${env.build_src_filter} +<../boards/lilygo-t-deck>
build_flags =
	${env.build_flags}
	-Iboards/lilygo-t-deck
	-mfix-esp32-psram-cache-issue
	-mfix-esp32-psram-cache-strategy=memw
	-Os
	-DCORE_DEBUG_LEVEL=1

	;Features Enabled
	# Config to use IRQ and RST pins of PN532, if needed
	;-DPN532_RF_REST=-1
	;-DPN532_IRQ=-1

	;FM Radio
	-DFM_SI4713=1 ;Uncomment to activate FM Radio using Adafruit Si4713
	-DFM_RSTPIN=-1
	;-DLITE_VERSION=1 ;limits some features to save space for M5Launcher Compatibility
	;Microphone
	; T-Deck mics are behind an ES7210 I2C codec (config'd on the keyboard Wire bus),
	; fed by a standard I2S RX channel. ES7210 pins (LilyGo utilities.h): MCLK=48,
	; SCK/BCLK=47, WS/LRCK=21, DIN=14. Enabling the mic uses GPIO48, so the NeoPixel
	; and trackball-centre button (GPIO0) are unavailable while the mic is running.
	-DMIC_ES7210=1
	-DPIN_CLK=47   ;I2S bit clock (ES7210 SCK)
	-DI2S_SCLK_PIN=47
	-DPIN_WS=21    ;I2S word select (ES7210 LRCK)
	-DPIN_MCLK=48  ;master clock the ES7210 needs
	-DI2S_DATA_PIN=14
	-DPIN_DATA=14  ;I2S data in (ES7210 DIN)

	; SERIAL (GPS) dedicated pins
	-DSERIAL_TX=43 ;may be wrong
	-DSERIAL_RX=44
	-DGPS_SERIAL_TX=SERIAL_TX
	-DGPS_SERIAL_RX=SERIAL_RX

	;RGB LED runned by xylopyrographer/LiteLED@^1.2.0 library
	;-DHAS_RGB_LED=1  ;uncomment to enable
	-DRGB_LED=-1

	;Have RTC Chip
	;-DHAS_RTC=1

	;Speaker to run music, compatible with NS4168/MAX98357
	; T-Deck I2S amp pinout (LilyGo utilities.h): BCK=7, WS/LRCK=5, DOUT=6, no MCLK.
	; (GPIO48 is the NeoPixel / ES7210-mic MCLK, NOT a speaker clock — do not use it here.)
	-DHAS_NS4168_SPKR=1
	-DBCLK=7
	-DWCLK=5
	-DDOUT=6
	-DMCLK=-1

	;Can run USB as HID
	-DUSB_as_HID=1 ;uncomment to enable
	-DBAD_TX=GROVE_SDA
	-DBAD_RX=GROVE_SCL

	;Battery ADC read pin
	-D ANALOG_BAT_PIN=4

	;Buttons configuration
	-DHAS_BTN=1
	-DBTN_ALIAS='"Mid"'
	-DBTN_PIN=0
	-DBTN_ACT=LOW

	;-DALLOW_ALL_GPIO_FOR_IR_RF=1 ; Set this option to make use of all GPIOs, from 1 to 44 to be chosen, except TFT and SD pins

	;Infrared Led default pin and state
	; IR TX/RX exposed on the Grove port (GPIO43/44) so external IR units
	; (e.g. M5Stack Unit IR, U002) work: yellow IR_TX / white IR_RX -> pins 43/44,
	; selected at runtime under IR > Config. Shares the Grove port with CC1101/NRF24/
	; W5500/GPS, so only one Grove peripheral can be connected at a time.
	-DIR_TX_PINS='{{"Pin 43", 43}, {"Pin 44", 44}}'
	-DIR_RX_PINS='{{"Pin 43", 43}, {"Pin 44", 44}}'
	-DTXLED=-1		;NEED TO SET SOMETHING HERE, at least -1
	-DLED_ON=HIGH
	-DLED_OFF=LOW

	;Radio Frequency (one pin modules) pin setting
	-DRF_TX_PINS='{{"Unavailable", -1}}'
	-DRF_RX_PINS='{{"Unavailable", -1}}'

	;CC1101 SPI connection pins
	; best connection pins for higher speed https://docs.espressif.com/projects/esp-idf/en/latest/esp32s3/api-reference/peripherals/spi_master.html#gpio-matrix-and-io-mux
	-DUSE_CC1101_VIA_SPI
	-DCC1101_GDO0_PIN=44
	-DCC1101_SS_PIN=43
	-DCC1101_MOSI_PIN=SPI_MOSI_PIN
	-DCC1101_SCK_PIN=SPI_SCK_PIN
	-DCC1101_MISO_PIN=SPI_MISO_PIN
	;-DCC1101_GDO2_PIN=14  ; optional

	; connections are the same as CC1101
	-DUSE_NRF24_VIA_SPI
	-DNRF24_CE_PIN=44
	-DNRF24_SS_PIN=43  ; chip select
	-DNRF24_MOSI_PIN=SPI_MOSI_PIN
	-DNRF24_SCK_PIN=SPI_SCK_PIN
	-DNRF24_MISO_PIN=SPI_MISO_PIN

	-DUSE_W5500_VIA_SPI
	-DW5500_SS_PIN=43
	-DW5500_MOSI_PIN=SPI_MOSI_PIN
	-DW5500_SCK_PIN=SPI_SCK_PIN
	-DW5500_MISO_PIN=SPI_MISO_PIN
	-DW5500_INT_PIN=44

	;Lora setup pins
	-DLORA_SCK=SPI_SCK_PIN
	-DLORA_MISO=SPI_MISO_PIN
	-DLORA_MOSI=SPI_MOSI_PIN
	-DLORA_CS=9
	-DLORA_RST=17
	-DLORA_DIO0=45
	-DLORA_BUSY=13

	;Font sizes, depending on device
	-DFP=1
	-DFM=2
	-DFG=3

	;Screen Setup
	-DHAS_SCREEN=1
	-DHAS_TOUCH
	-DROTATION=1
	-DBACKLIGHT=42
	-DMINBRIGHT=1

	;TFT_eSPI display
	-DUSER_SETUP_LOADED=1
	-DUSE_HSPI_PORT=1
	;-DUSER_SETUP_ID=214
	-DST7789_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	;-DTFT_INVERSION_ON
	-DTFT_RGB_ORDER=TFT_BGR
	-DTFT_BL=42
	-DTFT_MISO=38
	-DTFT_MOSI=41
	-DTFT_SCLK=40
	-DTFT_CS=12
	-DTFT_DC=11
	-DTFT_RST=-1
	-DTOUCH_CS=-1
	-DTFT_BACKLIGHT_ON=1
	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000

	;SD Card Setup pins
	-DSDCARD_CS=39
	-DSDCARD_SCK=40
	-DSDCARD_MISO=38
	-DSDCARD_MOSI=41

	;Default I2C port
	-DGROVE_SDA=43 # maybe need to switch pins
	-DGROVE_SCL=44 # maybe need to switch pins

	-DSPI_SCK_PIN=40
	-DSPI_MOSI_PIN=41
	-DSPI_MISO_PIN=38
	-DSPI_SS_PIN=-1
	-DT_DECK_PLUS
	-DDEVICE_NAME='"Lilygo T-Deck Plus"'

lib_deps =
	${env.lib_deps}
	lewisxhe/SensorLib@0.3.4


[env:lilygo-t-deck]
extends=env:lilygo-t-deck-pro
build_flags =
	${env:lilygo-t-deck-pro.build_flags}
	-DNORMAL_T_DECK=1
	; IR TX/RX (pins 43/44) are inherited from the pro env now.

	;Radio Frequency (one pin modules) pin setting
	-DRF_TX_PINS='{{"Pin 43", 43}, {"Pin 44", 44}}'
	-DRF_RX_PINS='{{"Pin 43", 43}, {"Pin 44", 44}}'
	-DDEVICE_NAME='"Lilygo T-Deck"'

build_unflags =
	-DRF_TX_PINS='{{"Unavailable", -1}}'
	-DRF_RX_PINS='{{"Unavailable", -1}}'
	-DDEVICE_NAME='"Lilygo T-Deck Plus"'
	-DT_DECK_PLUS
